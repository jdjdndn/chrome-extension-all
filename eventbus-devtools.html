<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EventBus Monitor</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 12px;
        background: #1e1e1e;
        color: #d4d4d4;
        overflow: hidden;
      }

      .container {
        display: flex;
        flex-direction: column;
        height: 100vh;
      }

      /* 头部 */
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 12px;
        background: #252526;
        border-bottom: 1px solid #3c3c3c;
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .logo-icon {
        width: 20px;
        height: 20px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border-radius: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        font-size: 10px;
        color: white;
      }

      .logo-text {
        font-weight: 600;
        font-size: 13px;
      }

      .version-badge {
        background: #007acc;
        padding: 2px 6px;
        border-radius: 3px;
        font-size: 10px;
      }

      .header-actions {
        display: flex;
        gap: 8px;
      }

      /* 标签页 */
      .tabs {
        display: flex;
        background: #252526;
        border-bottom: 1px solid #3c3c3c;
        overflow-x: auto;
      }

      .tab {
        padding: 8px 16px;
        cursor: pointer;
        border-right: 1px solid #3c3c3c;
        transition: background 0.2s;
        white-space: nowrap;
      }

      .tab:hover {
        background: #2d2d30;
      }

      .tab.active {
        background: #1e1e1e;
        border-bottom: 2px solid #007acc;
      }

      /* 内容区域 */
      .content {
        flex: 1;
        overflow: auto;
        padding: 12px;
      }

      .tab-content {
        display: none;
      }

      .tab-content.active {
        display: block;
      }

      /* 统计卡片 */
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
        gap: 12px;
        margin-bottom: 20px;
      }

      .stat-card {
        background: #252526;
        border-radius: 6px;
        padding: 12px;
        border: 1px solid #3c3c3c;
      }

      .stat-label {
        font-size: 10px;
        color: #858585;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .stat-value {
        font-size: 24px;
        font-weight: 600;
        margin-top: 4px;
        color: #4ec9b0;
      }

      .stat-value.change {
        font-size: 12px;
        margin-left: 4px;
      }

      .stat-value.positive {
        color: #4ec9b0;
      }

      .stat-value.negative {
        color: #f48771;
      }

      /* 按钮 */
      .btn {
        padding: 6px 12px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 11px;
        font-weight: 500;
        transition: all 0.2s;
      }

      .btn-primary {
        background: #007acc;
        color: white;
      }

      .btn-primary:hover {
        background: #0062a3;
      }

      .btn-success {
        background: #4ec9b0;
        color: #1e1e1e;
      }

      .btn-success:hover {
        background: #3db89a;
      }

      .btn-danger {
        background: #f48771;
        color: #1e1e1e;
      }

      .btn-danger:hover {
        background: #e07864;
      }

      .btn-secondary {
        background: #3c3c3c;
        color: #d4d4d4;
      }

      .btn-secondary:hover {
        background: #4c4c4c;
      }

      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      /* 消息列表 */
      .message-list {
        background: #252526;
        border-radius: 6px;
        border: 1px solid #3c3c3c;
        overflow: hidden;
      }

      .message-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 12px;
        background: #2d2d30;
        border-bottom: 1px solid #3c3c3c;
      }

      .message-items {
        max-height: 400px;
        overflow-y: auto;
      }

      .message-item {
        display: flex;
        align-items: flex-start;
        padding: 8px 12px;
        border-bottom: 1px solid #3c3c3c;
        cursor: pointer;
        transition: background 0.2s;
      }

      .message-item:hover {
        background: #2d2d30;
      }

      .message-item.selected {
        background: #264f78;
      }

      .message-icon {
        width: 24px;
        height: 24px;
        border-radius: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-right: 10px;
        font-size: 10px;
        flex-shrink: 0;
      }

      .message-icon.request {
        background: #007acc;
        color: white;
      }

      .message-icon.publish {
        background: #4ec9b0;
        color: #1e1e1e;
      }

      .message-icon.error {
        background: #f48771;
        color: #1e1e1e;
      }

      .message-content {
        flex: 1;
        min-width: 0;
      }

      .message-type {
        font-weight: 500;
        color: #d4d4d4;
        margin-bottom: 2px;
      }

      .message-meta {
        font-size: 10px;
        color: #858585;
      }

      .message-detail {
        padding: 12px;
        background: #1e1e1e;
        border-top: 1px solid #3c3c3c;
        font-family: 'Consolas', 'Monaco', monospace;
        font-size: 11px;
        white-space: pre-wrap;
        word-wrap: break-word;
        max-height: 200px;
        overflow-y: auto;
      }

      /* 图表 */
      .chart-container {
        background: #252526;
        border-radius: 6px;
        padding: 16px;
        border: 1px solid #3c3c3c;
        margin-bottom: 16px;
      }

      .chart-title {
        font-size: 12px;
        font-weight: 500;
        margin-bottom: 12px;
        color: #d4d4d4;
      }

      .chart {
        height: 120px;
        position: relative;
      }

      .chart-bar {
        position: absolute;
        bottom: 0;
        width: 8px;
        background: #007acc;
        border-radius: 2px 2px 0 0;
        transition: height 0.3s;
      }

      .chart-bar:hover {
        background: #1e8acc;
      }

      /* 健康状态 */
      .health-status {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 12px;
        background: #252526;
        border-radius: 6px;
        border: 1px solid #3c3c3c;
        margin-bottom: 16px;
      }

      .health-icon {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
      }

      .health-icon.healthy {
        background: #4ec9b0;
        color: #1e1e1e;
      }

      .health-icon.degraded {
        background: #dcdcaa;
        color: #1e1e1e;
      }

      .health-icon.unhealthy {
        background: #f48771;
        color: #1e1e1e;
      }

      .health-text {
        flex: 1;
      }

      .health-title {
        font-weight: 500;
        margin-bottom: 4px;
      }

      .health-description {
        font-size: 11px;
        color: #858585;
      }

      /* 问题列表 */
      .issues-list {
        margin-top: 16px;
      }

      .issue-item {
        padding: 10px 12px;
        background: #252526;
        border-radius: 6px;
        border-left: 3px solid;
        margin-bottom: 8px;
      }

      .issue-item.high {
        border-left-color: #f48771;
      }

      .issue-item.medium {
        border-left-color: #dcdcaa;
      }

      .issue-item.low {
        border-left-color: #4ec9b0;
      }

      .issue-header {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 4px;
      }

      .issue-severity {
        font-size: 10px;
        padding: 2px 6px;
        border-radius: 3px;
        text-transform: uppercase;
      }

      .issue-severity.high {
        background: #f48771;
        color: #1e1e1e;
      }

      .issue-severity.medium {
        background: #dcdcaa;
        color: #1e1e1e;
      }

      .issue-severity.low {
        background: #4ec9b0;
        color: #1e1e1e;
      }

      .issue-message {
        font-size: 11px;
        color: #d4d4d4;
        margin-bottom: 4px;
      }

      .issue-suggestion {
        font-size: 10px;
        color: #858585;
      }

      /* 滚动条 */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }

      ::-webkit-scrollbar-track {
        background: #1e1e1e;
      }

      ::-webkit-scrollbar-thumb {
        background: #3c3c3c;
        border-radius: 4px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: #4c4c4c;
      }

      /* 空状态 */
      .empty-state {
        text-align: center;
        padding: 40px 20px;
        color: #858585;
      }

      .empty-state-icon {
        font-size: 48px;
        margin-bottom: 12px;
        opacity: 0.5;
      }

      /* 工具栏 */
      .toolbar {
        display: flex;
        gap: 8px;
        margin-bottom: 12px;
      }

      .search-box {
        flex: 1;
        position: relative;
      }

      .search-box input {
        width: 100%;
        padding: 6px 12px 6px 30px;
        background: #252526;
        border: 1px solid #3c3c3c;
        border-radius: 4px;
        color: #d4d4d4;
        font-size: 11px;
      }

      .search-box input:focus {
        outline: none;
        border-color: #007acc;
      }

      .search-icon {
        position: absolute;
        left: 10px;
        top: 50%;
        transform: translateY(-50%);
        color: #858585;
        font-size: 12px;
      }

      /* 状态指示器 */
      .status-badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 2px 8px;
        border-radius: 10px;
        font-size: 10px;
        font-weight: 500;
      }

      .status-badge.recording {
        background: #f48771;
        color: #1e1e1e;
      }

      .status-badge.connected {
        background: #4ec9b0;
        color: #1e1e1e;
      }

      .status-badge.disconnected {
        background: #3c3c3c;
        color: #858585;
      }

      .recording-dot {
        width: 6px;
        height: 6px;
        background: currentColor;
        border-radius: 50%;
        animation: pulse 1s infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- 头部 -->
      <div class="header">
        <div class="logo">
          <div class="logo-icon">E</div>
          <span class="logo-text">EventBus Monitor</span>
          <span class="version-badge">V5</span>
        </div>
        <div class="header-actions">
          <span class="status-badge" id="connectionStatus">
            <span class="recording-dot"></span>
            连接中...
          </span>
        </div>
      </div>

      <!-- 标签页 -->
      <div class="tabs">
        <div class="tab active" data-tab="dashboard">仪表板</div>
        <div class="tab" data-tab="messages">消息</div>
        <div class="tab" data-tab="performance">性能</div>
        <div class="tab" data-tab="recording">录制</div>
        <div class="tab" data-tab="health">健康</div>
      </div>

      <!-- 内容区域 -->
      <div class="content">
        <!-- 仪表板 -->
        <div class="tab-content active" id="dashboard">
          <div class="stats-grid">
            <div class="stat-card">
              <div class="stat-label">已发送</div>
              <div class="stat-value" id="statSent">0</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">已接收</div>
              <div class="stat-value" id="statReceived">0</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">失败</div>
              <div class="stat-value" id="statFailed">0</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">平均延迟</div>
              <div class="stat-value" id="statLatency">0ms</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">订阅数</div>
              <div class="stat-value" id="statSubscriptions">0</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">运行时间</div>
              <div class="stat-value" id="statUptime">0s</div>
            </div>
          </div>

          <div class="chart-container">
            <div class="chart-title">消息吞吐量</div>
            <div class="chart" id="throughputChart"></div>
          </div>

          <div class="chart-container">
            <div class="chart-title">延迟分布</div>
            <div class="chart" id="latencyChart"></div>
          </div>
        </div>

        <!-- 消息 -->
        <div class="tab-content" id="messages">
          <div class="toolbar">
            <div class="search-box">
              <span class="search-icon">🔍</span>
              <input type="text" id="messageSearch" placeholder="搜索消息类型..." />
            </div>
            <button class="btn btn-secondary" id="clearMessages">清空</button>
            <button class="btn btn-secondary" id="exportMessages">导出</button>
          </div>
          <div class="message-list">
            <div class="message-header">
              <span>最近消息</span>
              <span id="messageCount">0 条</span>
            </div>
            <div class="message-items" id="messageItems">
              <div class="empty-state">
                <div class="empty-state-icon">📨</div>
                <div>暂无消息</div>
              </div>
            </div>
            <div class="message-detail" id="messageDetail" style="display: none"></div>
          </div>
        </div>

        <!-- 性能 -->
        <div class="tab-content" id="performance">
          <div class="chart-container">
            <div class="chart-title">内存使用</div>
            <div class="chart" id="memoryChart"></div>
          </div>

          <div class="message-list">
            <div class="message-header">
              <span>性能指标</span>
            </div>
            <div class="message-items" id="performanceItems">
              <!-- 动态生成 -->
            </div>
          </div>
        </div>

        <!-- 录制 -->
        <div class="tab-content" id="recording">
          <div class="toolbar">
            <button class="btn btn-success" id="startRecording">开始录制</button>
            <button class="btn btn-danger" id="stopRecording" disabled>停止录制</button>
            <button class="btn btn-secondary" id="replayRecording" disabled>回放</button>
            <button class="btn btn-secondary" id="exportRecording" disabled>导出</button>
            <button class="btn btn-secondary" id="clearRecording">清空</button>
          </div>

          <div class="message-list">
            <div class="message-header">
              <span>录制的消息</span>
              <span id="recordingCount">0 条</span>
            </div>
            <div class="message-items" id="recordingItems">
              <div class="empty-state">
                <div class="empty-state-icon">⏺️</div>
                <div>点击"开始录制"开始记录消息</div>
              </div>
            </div>
          </div>
        </div>

        <!-- 健康 -->
        <div class="tab-content" id="health">
          <div class="health-status" id="healthStatus">
            <div class="health-icon healthy">✓</div>
            <div class="health-text">
              <div class="health-title">系统健康</div>
              <div class="health-description">所有系统正常运行</div>
            </div>
          </div>

          <div class="issues-list" id="issuesList"></div>
        </div>
      </div>
    </div>

    <script src="eventbus-devtools.js"></script>
  </body>
</html>
