<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Custom Styles</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        font-size: 11px;
        background: #1e1e1e;
        color: #d4d4d4;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* Selector Section */
      .selector-section-main {
        padding: 8px;
        background: #252526;
        border-bottom: 1px solid #333;
      }

      .selector-label {
        color: #888;
        font-size: 10px;
        text-transform: uppercase;
        margin-bottom: 4px;
        display: flex;
        align-items: center;
        gap: 4px;
      }

      .selector-display {
        display: flex;
        align-items: center;
        gap: 4px;
        background: #1e1e1e;
        border: 1px solid #3c3c3c;
        border-radius: 4px;
        padding: 6px 8px;
        transition: border-color 0.2s;
      }

      .selector-display:hover {
        border-color: #007acc;
      }

      .selector-text {
        flex: 1;
        font-family: 'Consolas', 'Monaco', monospace;
        font-size: 11px;
        color: #4ec9b0;
        word-break: break-all;
        line-height: 1.4;
        user-select: all;
        cursor: text;
        white-space: pre-wrap;
      }

      .selector-text.empty {
        color: #666;
        font-style: italic;
      }

      .selector-status {
        font-size: 10px;
        color: #888;
        padding: 2px 8px 4px;
        min-height: 14px;
      }

      .selector-status.loading {
        color: #3794ff;
      }

      .selector-status.success {
        color: #4ec9b0;
      }

      .selector-status.error {
        color: #f48771;
      }

      /* Path breadcrumbs */
      .path-section {
        padding: 6px 8px;
        background: #2d2d2d;
        border-bottom: 1px solid #333;
        overflow-x: auto;
        white-space: nowrap;
      }

      .path-breadcrumbs {
        display: inline-flex;
        align-items: center;
        gap: 2px;
      }

      .path-item {
        font-family: 'Consolas', 'Monaco', monospace;
        font-size: 10px;
        color: #9cdcfe;
        background: #1e1e1e;
        padding: 2px 6px;
        border-radius: 3px;
        cursor: pointer;
        transition: all 0.2s;
      }

      .path-item:hover {
        background: #007acc;
        color: white;
      }

      .path-item.current {
        background: #4ec9b0;
        color: #1e1e1e;
      }

      .path-item.shadow-marker {
        background: #6b4c9a;
        color: #e0d4f7;
        font-style: italic;
      }

      .path-separator {
        color: #555;
        font-size: 10px;
      }

      /* Toolbar */
      .toolbar {
        display: flex;
        padding: 4px 6px;
        background: #252526;
        border-bottom: 1px solid #333;
        gap: 4px;
      }

      .toolbar button {
        background: #3c3c3c;
        border: 1px solid #555;
        color: #d4d4d4;
        padding: 2px 8px;
        cursor: pointer;
        font-size: 10px;
        border-radius: 2px;
        transition: all 0.2s;
      }

      .toolbar button:hover {
        background: #505050;
      }

      .toolbar button.active {
        background: #007acc;
        border-color: #007acc;
      }

      /* Element info */
      .element-info {
        padding: 4px 8px;
        background: #252526;
        border-bottom: 1px solid #333;
        font-family: 'Consolas', 'Monaco', monospace;
        color: #4ec9b0;
        font-size: 11px;
        display: none;
      }

      .element-info.visible {
        display: block;
      }

      /* Styles container */
      .styles-container {
        flex: 1;
        overflow-y: auto;
        padding: 4px 0;
      }

      .selector-section {
        margin-bottom: 8px;
        border-bottom: 1px solid #333;
      }

      .selector-header {
        display: flex;
        align-items: center;
        padding: 4px 8px;
        background: #2d2d2d;
        cursor: pointer;
        user-select: none;
      }

      .selector-header:hover {
        background: #333;
      }

      .selector-name {
        color: #4ec9b0;
        font-family: 'Consolas', 'Monaco', monospace;
        font-weight: 500;
        font-size: 11px;
      }

      .selector-file {
        color: #666;
        font-size: 10px;
        margin-left: auto;
        padding-left: 8px;
        max-width: 100px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .style-rules {
        padding: 4px 8px;
        font-family: 'Consolas', 'Monaco', monospace;
      }

      .style-rule {
        display: flex;
        padding: 1px 0;
        align-items: center;
      }

      .style-checkbox {
        width: 12px;
        height: 12px;
        margin-right: 4px;
        accent-color: #007acc;
        flex-shrink: 0;
      }

      .style-property {
        color: #9cdcfe;
        min-width: 80px;
        font-size: 11px;
      }

      .style-value {
        color: #ce9178;
        flex: 1;
        font-size: 11px;
      }

      .style-value input {
        background: transparent;
        border: none;
        color: #ce9178;
        font-family: inherit;
        font-size: inherit;
        width: 100%;
        outline: none;
      }

      .style-value input:focus {
        background: #3c3c3c;
        border-radius: 2px;
      }

      .empty-state {
        text-align: center;
        padding: 20px 12px;
        color: #666;
        font-size: 11px;
      }

      .error-state {
        text-align: center;
        padding: 12px;
        color: #f48771;
        background: rgba(244, 135, 113, 0.1);
        border-radius: 4px;
        margin: 8px;
        font-size: 11px;
      }

      /* Toast notification */
      .toast {
        position: fixed;
        bottom: 12px;
        left: 50%;
        transform: translateX(-50%) translateY(100px);
        background: #4caf50;
        color: white;
        padding: 6px 12px;
        border-radius: 4px;
        font-size: 11px;
        opacity: 0;
        transition: all 0.3s ease;
        z-index: 1000;
      }

      .toast.show {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }

      .toast.error {
        background: #f44336;
      }

      /* AI Panel */
      .ai-panel {
        background: #252526;
        border-bottom: 1px solid #333;
        max-height: 200px;
        overflow-y: auto;
      }

      .ai-panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 6px 8px;
        background: #2d2d2d;
        border-bottom: 1px solid #333;
        font-size: 10px;
        color: #c586c0;
        font-weight: bold;
      }

      .ai-close-btn {
        background: transparent;
        border: none;
        color: #888;
        cursor: pointer;
        font-size: 14px;
        padding: 0 4px;
      }

      .ai-close-btn:hover {
        color: #f48771;
      }

      .ai-panel-content {
        padding: 8px;
      }

      .ai-loading {
        display: flex;
        align-items: center;
        gap: 8px;
        color: #c586c0;
        font-size: 11px;
      }

      .ai-loading::before {
        content: '';
        width: 12px;
        height: 12px;
        border: 2px solid #c586c0;
        border-top-color: transparent;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      .ai-suggestion {
        margin-bottom: 8px;
        padding: 6px 8px;
        background: #1e1e1e;
        border-radius: 4px;
        border-left: 3px solid #6b4c9a;
      }

      .ai-suggestion-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 4px;
      }

      .ai-suggestion-type {
        font-size: 9px;
        color: #888;
        text-transform: uppercase;
      }

      .ai-suggestion-score {
        font-size: 10px;
        color: #4ec9b0;
        font-weight: bold;
      }

      .ai-suggestion-score.low {
        color: #f48771;
      }

      .ai-suggestion-score.medium {
        color: #dcdcaa;
      }

      .ai-suggestion-selector {
        font-family: 'Consolas', 'Monaco', monospace;
        font-size: 11px;
        color: #4ec9b0;
        word-break: break-all;
        cursor: pointer;
        padding: 4px;
        background: #2d2d2d;
        border-radius: 3px;
        margin: 4px 0;
      }

      .ai-suggestion-selector:hover {
        background: #3d3d3d;
      }

      .ai-suggestion-desc {
        font-size: 10px;
        color: #888;
        margin-top: 4px;
      }

      .ai-suggestion-actions {
        display: flex;
        gap: 4px;
        margin-top: 6px;
      }

      .ai-suggestion-actions button {
        background: #3c3c3c;
        border: 1px solid #555;
        color: #d4d4d4;
        padding: 2px 6px;
        cursor: pointer;
        font-size: 9px;
        border-radius: 2px;
      }

      .ai-suggestion-actions button:hover {
        background: #505050;
      }

      .ai-suggestion-actions button.primary {
        background: #007acc;
        border-color: #007acc;
      }

      .ai-error {
        color: #f48771;
        font-size: 11px;
        padding: 8px;
        text-align: center;
      }

      .ai-explanation {
        font-size: 11px;
        color: #d4d4d4;
        line-height: 1.5;
      }

      .ai-explanation code {
        background: #2d2d2d;
        padding: 1px 4px;
        border-radius: 3px;
        color: #4ec9b0;
        font-family: 'Consolas', 'Monaco', monospace;
      }

      .ai-explanation ul {
        margin: 4px 0 4px 16px;
      }

      .ai-explanation li {
        margin: 2px 0;
      }

      /* 选择器测试工具 */
      .selector-tester {
        background: #252526;
        border-bottom: 1px solid #333;
        padding: 8px;
      }

      .tester-header, .batch-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
        font-size: 10px;
        color: #059669;
        font-weight: bold;
      }

      .tester-close, .batch-close {
        background: transparent;
        border: none;
        color: #888;
        cursor: pointer;
        font-size: 14px;
      }

      .tester-close:hover, .batch-close:hover {
        color: #f48771;
      }

      .tester-input, .batch-section input, .batch-section select {
        width: 100%;
        background: #1e1e1e;
        border: 1px solid #3c3c3c;
        color: #d4d4d4;
        padding: 6px 8px;
        border-radius: 4px;
        font-family: 'Consolas', 'Monaco', monospace;
        font-size: 11px;
        margin-bottom: 8px;
      }

      .tester-input:focus, .batch-section input:focus, .batch-section select:focus {
        border-color: #007acc;
        outline: none;
      }

      .tester-result {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 8px;
        background: #1e1e1e;
        border-radius: 4px;
        margin-bottom: 8px;
      }

      .result-count {
        font-size: 16px;
        font-weight: bold;
        color: #4ec9b0;
        min-width: 30px;
      }

      .result-count.error {
        color: #f48771;
      }

      .result-text {
        color: #888;
        font-size: 10px;
      }

      .tester-actions, .batch-actions {
        display: flex;
        gap: 4px;
      }

      .tester-actions button, .batch-actions button {
        background: #3c3c3c;
        border: 1px solid #555;
        color: #d4d4d4;
        padding: 4px 10px;
        cursor: pointer;
        font-size: 10px;
        border-radius: 2px;
      }

      .tester-actions button:hover, .batch-actions button:hover {
        background: #505050;
      }

      .batch-actions button.primary {
        background: #007acc;
        border-color: #007acc;
      }

      /* 批量操作面板 */
      .batch-panel {
        background: #252526;
        border-bottom: 1px solid #333;
        padding: 8px;
      }

      .batch-section {
        margin-bottom: 8px;
      }

      .batch-section label {
        display: block;
        font-size: 10px;
        color: #888;
        margin-bottom: 4px;
      }

      .batch-section select {
        cursor: pointer;
      }

      .batch-result {
        margin-top: 8px;
        padding: 6px 8px;
        background: #1e1e1e;
        border-radius: 4px;
        font-size: 10px;
        color: #888;
        display: none;
      }

      .batch-result.visible {
        display: block;
      }

      .batch-result.success {
        color: #4ec9b0;
        border-left: 3px solid #4ec9b0;
      }

      .batch-result.error {
        color: #f48771;
        border-left: 3px solid #f48771;
      }

      /* 元素过滤 */
      .element-filter {
        padding: 6px 8px;
        background: #252526;
        border-bottom: 1px solid #333;
        display: none;
      }

      .element-filter.visible {
        display: block;
      }

      .element-filter input {
        width: 100%;
        background: #1e1e1e;
        border: 1px solid #3c3c3c;
        color: #d4d4d4;
        padding: 4px 8px;
        border-radius: 4px;
        font-size: 11px;
        margin-bottom: 4px;
      }

      .element-filter input:focus {
        border-color: #007acc;
        outline: none;
      }

      .filter-options {
        display: flex;
        gap: 12px;
        font-size: 10px;
      }

      .filter-options label {
        display: flex;
        align-items: center;
        gap: 4px;
        color: #888;
        cursor: pointer;
      }

      .filter-options input[type="checkbox"] {
        accent-color: #007acc;
      }

      /* 元素树 */
      .element-tree {
        font-family: 'Consolas', 'Monaco', monospace;
        font-size: 11px;
      }

      .tree-node {
        padding: 2px 4px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 4px;
      }

      .tree-node:hover {
        background: #2d2d2d;
      }

      .tree-node.selected {
        background: #094771;
      }

      .tree-tag {
        color: #4ec9b0;
      }

      .tree-id {
        color: #fbbf24;
      }

      .tree-class {
        color: #34d399;
      }

      .tree-children {
        padding-left: 16px;
        border-left: 1px solid #333;
        margin-left: 8px;
      }

      .tree-toggle {
        width: 12px;
        text-align: center;
        color: #666;
        font-size: 8px;
      }

      /* 主题变量 */
      :root {
        --bg-primary: #1e1e1e;
        --bg-secondary: #252526;
        --bg-tertiary: #2d2d2d;
        --border-color: #333;
        --text-primary: #d4d4d4;
        --text-secondary: #888;
        --accent: #007acc;
        --selector-color: #4ec9b0;
        --property-color: #9cdcfe;
        --value-color: #ce9178;
      }

      /* 亮色主题 */
      body.light-theme {
        --bg-primary: #ffffff;
        --bg-secondary: #f3f3f3;
        --bg-tertiary: #e8e8e8;
        --border-color: #d4d4d4;
        --text-primary: #333333;
        --text-secondary: #666666;
        --accent: #0066b8;
        --selector-color: #267f77;
        --property-color: #1a5fb8;
        --value-color: #b5540f;
      }

      body.light-theme {
        background: var(--bg-primary);
        color: var(--text-primary);
      }

      body.light-theme .selector-section-main,
      body.light-theme .toolbar,
      body.light-theme .ai-panel,
      body.light-theme .selector-tester,
      body.light-theme .batch-panel,
      body.light-theme .element-filter {
        background: var(--bg-secondary);
        border-color: var(--border-color);
      }

      body.light-theme .path-section,
      body.light-theme .selector-header {
        background: var(--bg-tertiary);
      }

      body.light-theme .selector-display,
      body.light-theme .tester-input,
      body.light-theme .batch-section input,
      body.light-theme .batch-section select,
      body.light-theme .element-filter input {
        background: var(--bg-primary);
        border-color: var(--border-color);
        color: var(--text-primary);
      }

      body.light-theme .selector-text {
        color: var(--selector-color);
      }

      body.light-theme .style-property {
        color: var(--property-color);
      }

      body.light-theme .style-value,
      body.light-theme .style-value input {
        color: var(--value-color);
      }

      /* 设置面板 */
      .settings-panel {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: var(--bg-secondary);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        padding: 16px;
        z-index: 2000;
        min-width: 300px;
        max-width: 400px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        display: none;
      }

      .settings-panel.visible {
        display: block;
      }

      .settings-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        padding-bottom: 8px;
        border-bottom: 1px solid var(--border-color);
      }

      .settings-title {
        font-weight: bold;
        color: var(--accent);
      }

      .settings-close {
        background: transparent;
        border: none;
        color: var(--text-secondary);
        cursor: pointer;
        font-size: 16px;
      }

      .settings-section {
        margin-bottom: 12px;
      }

      .settings-section label {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 6px;
        cursor: pointer;
      }

      .settings-section input[type="checkbox"] {
        accent-color: var(--accent);
      }

      .settings-section select {
        width: 100%;
        background: var(--bg-primary);
        border: 1px solid var(--border-color);
        color: var(--text-primary);
        padding: 6px 8px;
        border-radius: 4px;
      }

      /* 快捷键提示 */
      .shortcuts-hint {
        font-size: 9px;
        color: var(--text-secondary);
        padding: 4px 8px;
        background: var(--bg-tertiary);
        border-radius: 4px;
        margin-top: 8px;
      }

      .shortcuts-hint kbd {
        background: var(--bg-primary);
        padding: 1px 4px;
        border-radius: 2px;
        font-family: 'Consolas', monospace;
      }

      /* 选中元素列表面板 */
      .selected-elements-panel {
        background: var(--bg-secondary);
        border-bottom: 1px solid var(--border-color);
        max-height: 250px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      .selected-elements-panel.collapsed .selected-panel-content,
      .selected-elements-panel.collapsed .merged-selector-section {
        display: none;
      }

      .selected-elements-panel.collapsed {
        max-height: 32px;
      }

      .selected-panel-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 6px 8px;
        background: var(--bg-tertiary);
        border-bottom: 1px solid var(--border-color);
      }

      .selected-panel-title {
        font-size: 10px;
        font-weight: bold;
        color: #d97706;
      }

      .selected-panel-actions {
        display: flex;
        gap: 4px;
      }

      .selected-panel-actions button {
        background: transparent;
        border: none;
        color: var(--text-secondary);
        cursor: pointer;
        font-size: 12px;
        padding: 2px 4px;
        border-radius: 2px;
        transition: all 0.2s;
      }

      .selected-panel-actions button:hover {
        background: var(--bg-primary);
        color: var(--text-primary);
      }

      .selected-panel-content {
        flex: 1;
        overflow-y: auto;
        max-height: 120px;
        padding: 4px 0;
      }

      .empty-selection {
        text-align: center;
        padding: 12px;
        color: var(--text-secondary);
        font-size: 10px;
      }

      .selected-element-item {
        display: flex;
        align-items: center;
        padding: 4px 8px;
        gap: 6px;
        cursor: pointer;
        transition: background 0.15s;
      }

      .selected-element-item:hover {
        background: var(--bg-tertiary);
      }

      .selected-element-index {
        font-size: 9px;
        color: var(--text-secondary);
        min-width: 16px;
        text-align: center;
      }

      .selected-element-selector {
        flex: 1;
        font-family: 'Consolas', 'Monaco', monospace;
        font-size: 10px;
        color: var(--selector-color);
        word-break: break-all;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .selected-element-tag {
        font-size: 9px;
        color: #4ec9b0;
        background: rgba(78, 201, 176, 0.1);
        padding: 1px 4px;
        border-radius: 2px;
      }

      .selected-element-remove {
        background: transparent;
        border: none;
        color: var(--text-secondary);
        cursor: pointer;
        font-size: 12px;
        padding: 0 4px;
        opacity: 0;
        transition: opacity 0.15s;
      }

      .selected-element-item:hover .selected-element-remove {
        opacity: 1;
      }

      .selected-element-remove:hover {
        color: #f48771;
      }

      .merged-selector-section {
        padding: 6px 8px;
        background: var(--bg-tertiary);
        border-top: 1px solid var(--border-color);
      }

      .merged-selector-label {
        font-size: 9px;
        color: var(--text-secondary);
        margin-bottom: 4px;
        text-transform: uppercase;
      }

      .merged-selector-display {
        background: var(--bg-primary);
        border: 1px solid var(--border-color);
        border-radius: 4px;
        padding: 4px 8px;
        margin-bottom: 6px;
      }

      .merged-selector-display code {
        font-family: 'Consolas', 'Monaco', monospace;
        font-size: 10px;
        color: var(--selector-color);
        word-break: break-all;
        display: block;
        white-space: pre-wrap;
      }

      .merged-selector-actions {
        display: flex;
        gap: 4px;
      }

      .merged-selector-actions button {
        background: var(--bg-primary);
        border: 1px solid var(--border-color);
        color: var(--text-primary);
        padding: 3px 8px;
        cursor: pointer;
        font-size: 9px;
        border-radius: 2px;
        transition: all 0.2s;
      }

      .merged-selector-actions button:hover {
        background: var(--accent);
        border-color: var(--accent);
        color: white;
      }

      body.light-theme .selected-elements-panel,
      body.light-theme .merged-selector-section {
        background: var(--bg-secondary);
        border-color: var(--border-color);
      }

      body.light-theme .selected-panel-header,
      body.light-theme .merged-selector-section {
        background: var(--bg-tertiary);
      }

      body.light-theme .selected-element-item:hover {
        background: var(--bg-tertiary);
      }

      body.light-theme .selected-element-tag {
        background: rgba(38, 127, 119, 0.1);
        color: #267f77;
      }

      /* 批量选择面板增强样式 */
      .batch-panel {
        background: var(--bg-secondary);
        border-bottom: 1px solid var(--border-color);
      }

      .batch-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 8px 12px;
        background: var(--bg-tertiary);
        border-bottom: 1px solid var(--border-color);
        font-weight: bold;
        font-size: 12px;
      }

      .batch-close {
        background: transparent;
        border: none;
        color: var(--text-secondary);
        cursor: pointer;
        font-size: 16px;
        padding: 0 4px;
      }

      .batch-close:hover {
        color: #f48771;
      }

      .batch-content {
        padding: 12px;
      }

      /* 元素拾取控制按钮 */
      .picker-controls {
        display: flex;
        gap: 8px;
        margin-bottom: 12px;
      }

      .picker-btn {
        flex: 1;
        padding: 8px 12px;
        border: 1px solid var(--border-color);
        border-radius: 4px;
        background: var(--bg-primary);
        color: var(--text-primary);
        font-size: 11px;
        cursor: pointer;
        transition: all 0.2s;
      }

      .picker-btn:hover {
        background: var(--bg-tertiary);
      }

      .picker-btn.start {
        background: #059669;
        border-color: #10b981;
        color: white;
      }

      .picker-btn.start:hover {
        background: #10b981;
      }

      .picker-btn.stop {
        background: #dc2626;
        border-color: #ef4444;
        color: white;
      }

      .picker-btn.stop:hover {
        background: #ef4444;
      }

      .picker-btn.clear {
        background: transparent;
        border-color: #6b7280;
        color: #9ca3af;
      }

      .picker-btn.clear:hover {
        border-color: #f59e0b;
        color: #f59e0b;
      }

      /* 选中元素列表 */
      .selected-elements-list {
        max-height: 150px;
        overflow-y: auto;
        border: 1px solid var(--border-color);
        border-radius: 4px;
        margin-bottom: 12px;
        background: var(--bg-primary);
      }

      .empty-selection-hint {
        padding: 16px;
        text-align: center;
        color: var(--text-secondary);
        font-size: 11px;
      }

      .selected-element-item {
        display: flex;
        align-items: center;
        padding: 6px 10px;
        border-bottom: 1px solid var(--border-color);
        gap: 8px;
        cursor: pointer;
        transition: background 0.15s;
      }

      .selected-element-item:last-child {
        border-bottom: none;
      }

      .selected-element-item:hover {
        background: var(--bg-tertiary);
      }

      .selected-element-item .index {
        min-width: 20px;
        color: var(--text-secondary);
        font-size: 10px;
      }

      .selected-element-item .tag {
        background: rgba(78, 201, 176, 0.15);
        color: #4ec9b0;
        padding: 1px 6px;
        border-radius: 3px;
        font-size: 10px;
        font-family: 'Consolas', monospace;
      }

      .selected-element-item .selector {
        flex: 1;
        font-family: 'Consolas', monospace;
        font-size: 10px;
        color: #60a5fa;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .selected-element-item .remove-btn {
        background: transparent;
        border: none;
        color: var(--text-secondary);
        cursor: pointer;
        font-size: 14px;
        padding: 0 4px;
        opacity: 0;
        transition: opacity 0.15s;
      }

      .selected-element-item:hover .remove-btn {
        opacity: 1;
      }

      .selected-element-item .remove-btn:hover {
        color: #f48771;
      }

      /* 合并选择器区域 */
      .merged-selector-box {
        background: var(--bg-tertiary);
        border: 1px solid var(--border-color);
        border-radius: 4px;
        margin-bottom: 12px;
        overflow: hidden;
      }

      .merged-selector-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 6px 10px;
        background: var(--bg-secondary);
        border-bottom: 1px solid var(--border-color);
        font-size: 10px;
        color: var(--text-secondary);
      }

      .merged-count {
        color: #10b981;
        font-weight: bold;
      }

      .merged-selector-code {
        padding: 8px 10px;
        max-height: 80px;
        overflow-y: auto;
      }

      .merged-selector-code code {
        font-family: 'Consolas', monospace;
        font-size: 11px;
        color: #60a5fa;
        word-break: break-all;
        white-space: pre-wrap;
      }

      .merged-selector-btns {
        display: flex;
        gap: 4px;
        padding: 6px 10px;
        border-top: 1px solid var(--border-color);
      }

      .merged-selector-btns button {
        flex: 1;
        padding: 4px 8px;
        background: var(--bg-primary);
        border: 1px solid var(--border-color);
        color: var(--text-primary);
        font-size: 10px;
        border-radius: 3px;
        cursor: pointer;
        transition: all 0.2s;
      }

      .merged-selector-btns button:hover {
        background: var(--accent);
        border-color: var(--accent);
        color: white;
      }

      /* 批量操作区域 */
      .batch-operations {
        border-top: 1px solid var(--border-color);
        padding-top: 12px;
      }

      .batch-operations .batch-section {
        margin-bottom: 10px;
      }

      .batch-operations .batch-section label {
        display: block;
        font-size: 10px;
        color: var(--text-secondary);
        margin-bottom: 4px;
      }

      .batch-operations .batch-section select,
      .batch-operations .batch-section input {
        width: 100%;
        background: var(--bg-primary);
        border: 1px solid var(--border-color);
        color: var(--text-primary);
        padding: 6px 8px;
        border-radius: 4px;
        font-size: 11px;
      }

      .batch-operations .batch-section select:focus,
      .batch-operations .batch-section input:focus {
        border-color: var(--accent);
        outline: none;
      }

      .batch-operations .batch-actions {
        display: flex;
        gap: 8px;
        margin-top: 10px;
      }

      .batch-operations .batch-actions button {
        flex: 1;
        padding: 6px 12px;
        border: 1px solid var(--border-color);
        border-radius: 4px;
        background: var(--bg-primary);
        color: var(--text-primary);
        font-size: 11px;
        cursor: pointer;
        transition: all 0.2s;
      }

      .batch-operations .batch-actions button:hover {
        background: var(--bg-tertiary);
      }

      .batch-operations .batch-actions button.primary {
        background: var(--accent);
        border-color: var(--accent);
        color: white;
      }

      .batch-operations .batch-actions button.primary:hover {
        opacity: 0.9;
      }

      .batch-result {
        margin-top: 10px;
        padding: 8px;
        border-radius: 4px;
        font-size: 11px;
        display: none;
      }

      .batch-result.visible {
        display: block;
      }

      .batch-result.success {
        background: rgba(16, 185, 129, 0.1);
        color: #10b981;
        border: 1px solid rgba(16, 185, 129, 0.3);
      }

      .batch-result.error {
        background: rgba(239, 68, 68, 0.1);
        color: #ef4444;
        border: 1px solid rgba(239, 68, 68, 0.3);
      }
    </style>
  </head>
  <body>
    <!-- CSS Selector Display -->
    <div class="selector-section-main">
      <div class="selector-label">
        <span>CSS选择器精选</span>
      </div>
      <div class="selector-display">
        <span class="selector-text empty" id="css-selector">Select an element</span>
      </div>
      <div class="selector-status" id="selector-status"></div>
    </div>

    <!-- Path Breadcrumbs -->
    <div class="path-section">
      <div class="path-breadcrumbs" id="path-breadcrumbs">
        <span class="empty-state" style="color: #666; font-size: 10px;">No element selected</span>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <button id="refresh-btn" title="刷新 (R)">🔄</button>
      <button id="computed-btn" title="计算样式 (C)">📐</button>
      <button id="ai-btn" style="background: #6b4c9a; border-color: #8b6cb5;" title="AI 优化选择器">✨</button>
      <button id="ai-explain-btn" style="background: #2d5a87; border-color: #3d7ab7;" title="AI 分析元素">🔍</button>
      <button id="test-btn" style="background: #059669; border-color: #10b981;" title="测试选择器 (T)">🧪</button>
      <button id="batch-btn" style="background: #d97706; border-color: #f59e0b;" title="批量操作 (B)">📦</button>
      <div style="flex:1"></div>
      <button id="theme-btn" title="切换主题">🎨</button>
      <button id="settings-btn" title="设置">⚙️</button>
    </div>

    <!-- 选择器测试工具 -->
    <div class="selector-tester" id="selector-tester" style="display: none;">
      <div class="tester-header">
        <span>选择器测试工具</span>
        <button class="tester-close" id="tester-close">×</button>
      </div>
      <div class="tester-content">
        <input type="text" id="tester-input" placeholder="输入 CSS 选择器进行测试..." />
        <div class="tester-result" id="tester-result">
          <span class="result-count">-</span>
          <span class="result-text">等待输入</span>
        </div>
        <div class="tester-actions">
          <button id="tester-highlight">高亮匹配</button>
          <button id="tester-copy">复制选择器</button>
        </div>
      </div>
    </div>

    <!-- 批量操作面板 -->
    <div class="batch-panel" id="batch-panel" style="display: none;">
      <div class="batch-header">
        <span>批量选择元素</span>
        <button class="batch-close" id="batch-close">×</button>
      </div>
      <div class="batch-content">
        <!-- 元素拾取控制 -->
        <div class="picker-controls">
          <button id="start-picker-btn" class="picker-btn start">🎯 开始选择</button>
          <button id="stop-picker-btn" class="picker-btn stop" style="display:none;">⏹️ 停止选择</button>
          <button id="clear-selection-btn" class="picker-btn clear">🗑️ 清除选择</button>
        </div>

        <!-- 选中元素列表 -->
        <div class="selected-elements-list" id="selected-elements-list">
          <div class="empty-selection-hint">点击"开始选择"后在页面上选择元素</div>
        </div>

        <!-- 合并选择器显示 -->
        <div class="merged-selector-box">
          <div class="merged-selector-header">
            <span>合并选择器</span>
            <span id="merged-count" class="merged-count">0 个元素</span>
          </div>
          <div class="merged-selector-code" id="merged-selector-code">
            <code>-</code>
          </div>
          <div class="merged-selector-btns">
            <button id="copy-merged-selector-btn">📋 复制</button>
            <button id="optimize-selector-btn">✨ 优化</button>
          </div>
        </div>

        <!-- 批量操作 -->
        <div class="batch-operations">
          <div class="batch-section">
            <label>批量操作</label>
            <select id="batch-action">
              <option value="addClass">添加 Class</option>
              <option value="removeClass">移除 Class</option>
              <option value="setAttribute">设置属性</option>
              <option value="removeAttribute">移除属性</option>
              <option value="setStyle">设置样式</option>
              <option value="hideElements">隐藏元素</option>
            </select>
          </div>
          <div class="batch-section" id="batch-params">
            <label>Class 名称</label>
            <input type="text" id="batch-class-name" placeholder="如: active, hidden" />
          </div>
          <div class="batch-actions">
            <button id="batch-preview">预览</button>
            <button id="batch-execute" class="primary">执行</button>
          </div>
          <div class="batch-result" id="batch-result"></div>
        </div>
      </div>
    </div>

    <!-- 元素过滤/搜索 -->
    <div class="element-filter" id="element-filter">
      <input type="text" id="filter-input" placeholder="过滤元素 (标签/class/id)..." />
      <div class="filter-options">
        <label><input type="checkbox" id="filter-tag" checked /> 标签</label>
        <label><input type="checkbox" id="filter-class" checked /> Class</label>
        <label><input type="checkbox" id="filter-id" checked /> ID</label>
      </div>
    </div>

    <!-- AI Suggestions Panel -->
    <div class="ai-panel" id="ai-panel" style="display: none;">
      <div class="ai-panel-header">
        <span>AI 选择器建议</span>
        <button class="ai-close-btn" id="ai-close-btn">×</button>
      </div>
      <div class="ai-panel-content" id="ai-panel-content">
        <div class="ai-loading">AI 正在分析...</div>
      </div>
    </div>

    <!-- Styles Container -->
    <div class="styles-container" id="styles-container">
      <div class="empty-state">Select an element to view styles</div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- 设置面板 -->
    <div class="settings-panel" id="settings-panel">
      <div class="settings-header">
        <span class="settings-title">⚙️ 设置</span>
        <button class="settings-close" id="settings-close">×</button>
      </div>
      <div class="settings-section">
        <label>
          <input type="checkbox" id="setting-auto-preview" checked />
          自动预览选择器匹配结果
        </label>
        <label>
          <input type="checkbox" id="setting-show-matched" checked />
          显示匹配的样式规则
        </label>
        <label>
          <input type="checkbox" id="setting-show-inherited" />
          显示继承的样式
        </label>
        <label>
          <input type="checkbox" id="setting-compact-mode" />
          紧凑模式
        </label>
      </div>
      <div class="settings-section">
        <label>选择器生成策略</label>
        <select id="setting-strategy">
          <option value="prefer-id">优先使用 ID</option>
          <option value="prefer-class">优先使用 Class</option>
          <option value="prefer-attribute">优先使用属性</option>
          <option value="shortest">最短选择器</option>
        </select>
      </div>
      <div class="settings-section">
        <label>主题</label>
        <select id="setting-theme">
          <option value="dark">暗色主题</option>
          <option value="light">亮色主题</option>
          <option value="auto">跟随系统</option>
        </select>
      </div>
      <div class="shortcuts-hint">
        <strong>快捷键:</strong>
        <kbd>R</kbd> 刷新 · <kbd>C</kbd> 计算样式 · <kbd>T</kbd> 测试 · <kbd>B</kbd> 批量 · <kbd>Ctrl+F</kbd> 过滤 · <kbd>Esc</kbd> 关闭
      </div>
    </div>

    <!-- EventBus V4.6 和 StorageBridge -->
    <script src="../event-bus-v4.6.js"></script>
    <script src="../content/utils/storage-bridge.js"></script>
    <script src="sidebar-styles.js"></script>
  </body>
</html>
