<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Custom Styles</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        font-size: 11px;
        background: #1e1e1e;
        color: #d4d4d4;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* Selector Section */
      .selector-section-main {
        padding: 8px;
        background: #252526;
        border-bottom: 1px solid #333;
      }

      .selector-label {
        color: #888;
        font-size: 10px;
        text-transform: uppercase;
        margin-bottom: 4px;
        display: flex;
        align-items: center;
        gap: 4px;
      }

      .selector-display {
        display: flex;
        align-items: center;
        gap: 4px;
        background: #1e1e1e;
        border: 1px solid #3c3c3c;
        border-radius: 4px;
        padding: 6px 8px;
        transition: border-color 0.2s;
      }

      .selector-display:hover {
        border-color: #007acc;
      }

      .selector-text {
        flex: 1;
        font-family: 'Consolas', 'Monaco', monospace;
        font-size: 11px;
        color: #4ec9b0;
        word-break: break-all;
        line-height: 1.4;
        user-select: all;
        cursor: text;
        white-space: pre-wrap;
      }

      .selector-text.empty {
        color: #666;
        font-style: italic;
      }

      .selector-status {
        font-size: 10px;
        color: #888;
        padding: 2px 8px 4px;
        min-height: 14px;
      }

      .selector-status.loading {
        color: #3794ff;
      }

      .selector-status.success {
        color: #4ec9b0;
      }

      .selector-status.error {
        color: #f48771;
      }

      /* Path breadcrumbs */
      .path-section {
        padding: 6px 8px;
        background: #2d2d2d;
        border-bottom: 1px solid #333;
        overflow-x: auto;
        white-space: nowrap;
      }

      .path-breadcrumbs {
        display: inline-flex;
        align-items: center;
        gap: 2px;
      }

      .path-item {
        font-family: 'Consolas', 'Monaco', monospace;
        font-size: 10px;
        color: #9cdcfe;
        background: #1e1e1e;
        padding: 2px 6px;
        border-radius: 3px;
        cursor: pointer;
        transition: all 0.2s;
      }

      .path-item:hover {
        background: #007acc;
        color: white;
      }

      .path-item.current {
        background: #4ec9b0;
        color: #1e1e1e;
      }

      .path-item.shadow-marker {
        background: #6b4c9a;
        color: #e0d4f7;
        font-style: italic;
      }

      .path-separator {
        color: #555;
        font-size: 10px;
      }

      /* Toolbar */
      .toolbar {
        display: flex;
        padding: 4px 6px;
        background: #252526;
        border-bottom: 1px solid #333;
        gap: 4px;
      }

      .toolbar button {
        background: #3c3c3c;
        border: 1px solid #555;
        color: #d4d4d4;
        padding: 2px 8px;
        cursor: pointer;
        font-size: 10px;
        border-radius: 2px;
        transition: all 0.2s;
      }

      .toolbar button:hover {
        background: #505050;
      }

      .toolbar button.active {
        background: #007acc;
        border-color: #007acc;
      }

      /* Element info */
      .element-info {
        padding: 4px 8px;
        background: #252526;
        border-bottom: 1px solid #333;
        font-family: 'Consolas', 'Monaco', monospace;
        color: #4ec9b0;
        font-size: 11px;
        display: none;
      }

      .element-info.visible {
        display: block;
      }

      /* Styles container */
      .styles-container {
        flex: 1;
        overflow-y: auto;
        padding: 4px 0;
      }

      .selector-section {
        margin-bottom: 8px;
        border-bottom: 1px solid #333;
      }

      .selector-header {
        display: flex;
        align-items: center;
        padding: 4px 8px;
        background: #2d2d2d;
        cursor: pointer;
        user-select: none;
      }

      .selector-header:hover {
        background: #333;
      }

      .selector-name {
        color: #4ec9b0;
        font-family: 'Consolas', 'Monaco', monospace;
        font-weight: 500;
        font-size: 11px;
      }

      .selector-file {
        color: #666;
        font-size: 10px;
        margin-left: auto;
        padding-left: 8px;
        max-width: 100px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .style-rules {
        padding: 4px 8px;
        font-family: 'Consolas', 'Monaco', monospace;
      }

      .style-rule {
        display: flex;
        padding: 1px 0;
        align-items: center;
      }

      .style-checkbox {
        width: 12px;
        height: 12px;
        margin-right: 4px;
        accent-color: #007acc;
        flex-shrink: 0;
      }

      .style-property {
        color: #9cdcfe;
        min-width: 80px;
        font-size: 11px;
      }

      .style-value {
        color: #ce9178;
        flex: 1;
        font-size: 11px;
      }

      .style-value input {
        background: transparent;
        border: none;
        color: #ce9178;
        font-family: inherit;
        font-size: inherit;
        width: 100%;
        outline: none;
      }

      .style-value input:focus {
        background: #3c3c3c;
        border-radius: 2px;
      }

      .empty-state {
        text-align: center;
        padding: 20px 12px;
        color: #666;
        font-size: 11px;
      }

      .error-state {
        text-align: center;
        padding: 12px;
        color: #f48771;
        background: rgba(244, 135, 113, 0.1);
        border-radius: 4px;
        margin: 8px;
        font-size: 11px;
      }

      /* Toast notification */
      .toast {
        position: fixed;
        bottom: 12px;
        left: 50%;
        transform: translateX(-50%) translateY(100px);
        background: #4caf50;
        color: white;
        padding: 6px 12px;
        border-radius: 4px;
        font-size: 11px;
        opacity: 0;
        transition: all 0.3s ease;
        z-index: 1000;
      }

      .toast.show {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }

      .toast.error {
        background: #f44336;
      }
    </style>
  </head>
  <body>
    <!-- CSS Selector Display -->
    <div class="selector-section-main">
      <div class="selector-label">
        <span>CSS选择器精选</span>
      </div>
      <div class="selector-display">
        <span class="selector-text empty" id="css-selector">Select an element</span>
      </div>
      <div class="selector-status" id="selector-status"></div>
    </div>

    <!-- Path Breadcrumbs -->
    <div class="path-section">
      <div class="path-breadcrumbs" id="path-breadcrumbs">
        <span class="empty-state" style="color: #666; font-size: 10px;">No element selected</span>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <button id="refresh-btn">Refresh</button>
      <button id="computed-btn">Computed</button>
    </div>

    <!-- Styles Container -->
    <div class="styles-container" id="styles-container">
      <div class="empty-state">Select an element to view styles</div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script src="sidebar-styles.js"></script>
  </body>
</html>
